---
# ─── Student Feedback System — Ansible Deployment Playbook ──────────
# This playbook is executed by Jenkins inside a Docker container.
# It deploys the Flask app container on the Docker host machine.
#
# Variables passed via --extra-vars from Jenkinsfile:
#   image_name    : Docker image name   (student-feedback-system)
#   image_tag     : Docker image tag    (build number)
#   container_name: Container name      (feedback-app)
#   host_port     : Host port           (8090)
#   app_port      : Container port      (5000)

- name: Deploy Student Feedback Application
  hosts: local
  become: false

  vars:
    image_name:     "student-feedback-system"
    image_tag:      "latest"
    container_name: "feedback-app"
    host_port:      "8090"
    app_port:       "5000"
    data_volume:    "feedback_data"

  tasks:

    # ── 1. Print deployment info ───────────────────────────────────
    - name: Print deployment info
      debug:
        msg:
          - "Deploying : {{ image_name }}:{{ image_tag }}"
          - "Container : {{ container_name }}"
          - "Port      : {{ host_port }} → {{ app_port }}"

    # ── 2. Create named volume ─────────────────────────────────────
    - name: Create named volume for persistent data
      command: docker volume create {{ data_volume }}
      register: volume_result
      changed_when: "'Created' in volume_result.stdout or volume_result.rc == 0"

    # ── 3. Stop existing container ─────────────────────────────────
    - name: Stop existing container (if running)
      command: docker stop {{ container_name }}
      register: stop_result
      failed_when: false
      changed_when: stop_result.rc == 0

    # ── 4. Remove existing container ──────────────────────────────
    - name: Remove existing container (if exists)
      command: docker rm {{ container_name }}
      register: rm_result
      failed_when: false
      changed_when: rm_result.rc == 0

    # ── 5. Start the new container ─────────────────────────────────
    - name: Start the feedback application container
      command: >
        docker run -d
        --name {{ container_name }}
        --restart unless-stopped
        -p {{ host_port }}:{{ app_port }}
        -v {{ data_volume }}:/data
        -e DB_PATH=/data/feedback.db
        -e FLASK_ENV=production
        {{ image_name }}:{{ image_tag }}
      register: run_result

    - name: Show container ID
      debug:
        msg: "Container started: {{ run_result.stdout[:12] }}"

    # ── 6. Wait for app to be ready ───────────────────────────────
    - name: Wait for application health check
      uri:
        url: "http://host.docker.internal:{{ host_port }}/health"
        method: GET
        status_code: 200
        timeout: 5
      register: health_check
      retries: 10
      delay: 3
      until: health_check.status == 200

    # ── 7. Confirm deployment ──────────────────────────────────────
    - name: Deployment complete
      debug:
        msg:
          - "✓ Deployment successful!"
          - "  URL   : http://localhost:{{ host_port }}"
          - "  Image : {{ image_name }}:{{ image_tag }}"

    # ── 8. Show running container ──────────────────────────────────
    - name: List running containers
      command: docker ps --filter name={{ container_name }} --format "table {{ '{{' }}.Names{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}\t{{ '{{' }}.Ports{{ '}}' }}"
      register: docker_ps
      changed_when: false

    - name: Print container status
      debug:
        msg: "{{ docker_ps.stdout_lines }}"
